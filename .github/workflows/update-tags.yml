name: Update Danbooru Tags

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade -r requirements.txt

      - name: Fetch Danbooru tags
        run: python -u scripts/fetch_danbooru_tags.py
        
      - name: Commit updated tag files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Danbooru tags"
          file_pattern: data/danbooru_tags.csv data/autocomplete.txt
